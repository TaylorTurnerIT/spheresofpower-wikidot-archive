name: Scheduled Wiki Sync
on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wdotcrawl
        uses: actions/checkout@v4
        with:
          repository: TaylorTurnerIT/wdotcrawl # Your fork of the crawler
          path: crawler

      - name: Checkout Dump Repository
        uses: actions/checkout@v4
        with:
          path: dump-repo
          fetch-depth: 0 # CRITICAL: Fetches full git history so crawler can read the last commit time
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Run Crawler
        run: |
          cd crawler
          # Force cache checking to ignore commits authored by TaylorTurnerIT or copilot to find the true last wikidot change
          sed -i 's@'\''--format=%at'\''@'\''--format=%at'\'', '\''--perl-regexp'\'', '\''--author=^((?!TaylorTurnerIT|copilot).)*$'\''@' crawl.py
          uv sync
          # The sitemap optimization we added will trigger on this command!
          uv run python crawl.py http://spheresofpower.wikidot.com --dump ../dump-repo

      - name: Push new commits
        run: |
          cd dump-repo
          # Push the newly generated commits (wdotcrawl automatically creates them)
          git push origin main
